steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/codekids', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/codekids']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - codekids
      - --image
      - gcr.io/$PROJECT_ID/codekids
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - '8080'
      - --memory
      - 1Gi
      - --set-env-vars
      - OPENAI_API_KEY=$_OPENAI_API_KEY

substitutions:
  _OPENAI_API_KEY: ''

images:
  - 'gcr.io/$PROJECT_ID/codekids'
