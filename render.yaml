services:
  - type: web
    name: codekids
    env: python
    region: oregon
    plan: free

    buildCommand: |
      pip install -r backend/requirements.txt && cd frontend && npm install && npm run build

    startCommand: |
      cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
